name: Deploy to GitHub Pages

# Builds the site and publishes it to GitHub Pages on every push to main.
# One-time setup:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Add repo secrets SUPABASE_URL and SUPABASE_ANON_KEY
#      (Settings → Secrets and variables → Actions). Same two the keep-alive uses.
# The base path is derived from the repo name automatically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue the newest, drop stale ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Project pages serve from /<repo>/ — set Vite's base to match.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Public by design; injected at build time from repo secrets.
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_ENTRY_CODE: ${{ secrets.ENTRY_CODE }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
