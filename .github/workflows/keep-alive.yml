name: keep-alive

# Supabase pauses a free project after ~7 days with no activity. One cheap
# request a day keeps it awake. Needs two repo secrets (Settings → Secrets →
# Actions): SUPABASE_URL and SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: "17 6 * * *" # every day at 06:17 UTC
  workflow_dispatch: {} # lets you run it by hand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret."
            exit 1
          fi
          # Strip trailing slash to avoid double-slash in the URL
          BASE="${SUPABASE_URL%/}"
          HEALTH_URL="${BASE}/auth/v1/health"
          echo "Pinging: $HEALTH_URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$HEALTH_URL")
          echo "HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "Awake."
          else
            echo "Unexpected status"
            exit 1
          fi
