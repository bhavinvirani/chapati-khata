name: keep-alive

# Supabase pauses a free project after ~7 days with no activity. One cheap
# request a day keeps it awake. Needs repo secret SUPABASE_URL
# (Settings → Secrets → Actions).

on:
  schedule:
    - cron: "17 6 * * *" # every day at 06:17 UTC
  workflow_dispatch: {} # lets you run it by hand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL secret."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/auth/v1/health")
          echo "HTTP $code"
          # Any 2xx/3xx means the project answered and is now awake.
          case "$code" in
            2*|3*) echo "Awake." ;;
            *) echo "Unexpected status"; exit 1 ;;
          esac
